<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Onyx — No Connection</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #000;
      color: #f2f2f2;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    .root {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      text-align: center;
      gap: 0;
      background: #000;
    }

    /* Logo */
    .logo-wrap {
      width: 72px; height: 72px;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 28px;
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: cover; }

    /* Animated signal icon */
    .signal-icon {
      width: 56px; height: 56px;
      margin-bottom: 24px;
      position: relative;
      display: flex; align-items: center; justify-content: center;
    }
    .signal-ring {
      position: absolute;
      border: 2px solid rgba(157, 143, 255, 0.25);
      border-radius: 50%;
      animation: pulse-ring 2s ease-out infinite;
    }
    .signal-ring:nth-child(1) { width: 56px; height: 56px; animation-delay: 0s; }
    .signal-ring:nth-child(2) { width: 40px; height: 40px; animation-delay: 0.4s; }
    .signal-core {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(157, 143, 255, 0.12);
      border: 2px solid rgba(157, 143, 255, 0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 1;
    }
    .signal-core svg { width: 14px; height: 14px; color: #9d8fff; }

    @keyframes pulse-ring {
      0%   { transform: scale(0.95); opacity: 0.6; }
      50%  { transform: scale(1.05); opacity: 0.25; }
      100% { transform: scale(0.95); opacity: 0.6; }
    }

    h1 {
      font-size: 20px; font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }
    p {
      font-size: 14px; color: #606060;
      line-height: 1.6;
      max-width: 240px;
      margin-bottom: 36px;
    }

    .retry-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 28px;
      background: #9d8fff;
      color: #fff;
      border: none; border-radius: 14px;
      font-size: 15px; font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    .retry-btn:active { background: #b8aaff; transform: scale(0.97); }

    .status-text {
      margin-top: 20px;
      font-size: 12px; color: #404040;
      min-height: 16px;
      transition: color 0.3s;
    }
    .status-text.checking { color: #9d8fff; }
  </style>
</head>
<body>
  <div class="root">

    <!-- Logo -->
    <div class="logo-wrap">
      <img src="/onyx-logo.png" alt="Onyx" onerror="this.style.display='none'" />
    </div>

    <!-- Animated signal -->
    <div class="signal-icon">
      <div class="signal-ring"></div>
      <div class="signal-ring"></div>
      <div class="signal-core">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"/>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
          <line x1="12" y1="20" x2="12.01" y2="20"/>
        </svg>
      </div>
    </div>

    <h1>No Connection</h1>
    <p>Onyx needs an internet connection to connect to your community.</p>

    <button class="retry-btn" onclick="retry()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.5"/>
      </svg>
      Try Again
    </button>

    <p class="status-text" id="status">Auto-retrying…</p>
  </div>

  <script>
    const STATUS_URL = 'https://onyx-api0.up.railway.app/health';
    let retryTimer = null;

    function setStatus(msg, cls) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = 'status-text' + (cls ? ' ' + cls : '');
    }

    async function retry() {
      setStatus('Checking connection…', 'checking');
      clearTimeout(retryTimer);
      try {
        const res = await fetch(STATUS_URL, { method: 'HEAD', cache: 'no-store', signal: AbortSignal.timeout(5000) });
        if (res.ok || res.status < 500) {
          setStatus('Connected! Loading…', 'checking');
          setTimeout(() => location.reload(), 300);
          return;
        }
      } catch { /* still offline */ }
      setStatus('Still offline. Retrying…');
      scheduleRetry();
    }

    function scheduleRetry() {
      clearTimeout(retryTimer);
      retryTimer = setTimeout(retry, 6000);
    }

    // Start auto-retry cycle
    scheduleRetry();
  </script>
</body>
</html>
