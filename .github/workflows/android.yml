name: Android Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Capacitor CLI requires Node >= 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Install from root so all workspace packages are hoisted correctly
      - name: Install dependencies
        run: npm install

      # Build the web app first — Capacitor needs the dist/ output
      - name: Build web app
        run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.ONYX_APP_URL }}/api

      # Add android platform (generates android/ directory)
      # This must run before sync — android/ is not committed to the repo
      - name: Add Android platform
        run: npx cap add android
        working-directory: apps/web
        env:
          ONYX_APP_URL: ${{ secrets.ONYX_APP_URL }}

      # Sync web assets + config into the android project
      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: apps/web
        env:
          ONYX_APP_URL: ${{ secrets.ONYX_APP_URL }}

      - name: Make gradlew executable
        run: chmod +x apps/web/android/gradlew

      # Build unsigned debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/web/android

      # Find and rename the APK to a clean filename
      - name: Rename APK
        run: |
          APK=$(find apps/web/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" Onyx.apk

      # Upload to GitHub Release (same release as .exe)
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Onyx.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also save as an Actions artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Onyx-Android-APK
          path: Onyx.apk
          retention-days: 30
