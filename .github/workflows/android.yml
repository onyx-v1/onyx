name: Android Build

on:
  workflow_dispatch: # manual trigger only — version tags no longer build Android

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Capacitor CLI requires Node >= 22
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Install from root so all workspace packages are hoisted correctly
      - name: Install dependencies
        run: npm install

      # Build the web app first — Capacitor needs the dist/ output
      - name: Build web app
        run: npm run build
        working-directory: apps/web
        env:
          VITE_API_URL: ${{ secrets.ONYX_APP_URL }}/api

      # Add android platform (generates android/ directory)
      # This must run before sync — android/ is not committed to the repo
      - name: Add Android platform
        run: npx cap add android
        working-directory: apps/web
        env:
          ONYX_APP_URL: ${{ secrets.ONYX_APP_URL }}

      # ── Edge-to-edge + notch fix ──────────────────────────────────────────
      # Patches the generated Android XML before Gradle build.
      # This is the ONLY reliable way to enable:
      #   1. Transparent status bar (content renders UNDER it)
      #   2. Display cutout / notch support (shortEdges mode)
      # The CSS env(safe-area-inset-top) then handles correct content padding.
      - name: Patch Android for edge-to-edge, notch, and Firebase
        run: |
          python3 << 'PYEOF'
          import re

          # ── 1. Patch styles.xml ──────────────────────────────────────────────
          styles_path = 'apps/web/android/app/src/main/res/values/styles.xml'
          with open(styles_path, 'r') as f:
              styles = f.read()

          edge_items = (
              '\n        <item name="android:statusBarColor">@android:color/transparent</item>'
              '\n        <item name="android:navigationBarColor">@android:color/transparent</item>'
              '\n        <item name="android:windowTranslucentStatus">true</item>'
              '\n        <item name="android:windowLayoutInDisplayCutoutMode">shortEdges</item>'
          )

          last_close = styles.rfind('</style>')
          if last_close != -1:
              styles = styles[:last_close] + edge_items + '\n    </style>' + styles[last_close + len('</style>'):]

          with open(styles_path, 'w') as f:
              f.write(styles)
          print('[OK] styles.xml patched with edge-to-edge items')

          # ── 2. Patch AndroidManifest.xml ─────────────────────────────────────
          manifest_path = 'apps/web/android/app/src/main/AndroidManifest.xml'
          with open(manifest_path, 'r') as f:
              manifest = f.read()

          if 'windowLayoutInDisplayCutoutMode' not in manifest:
              manifest = manifest.replace(
                  'android:screenOrientation="portrait"',
                  'android:screenOrientation="portrait"\n            android:windowLayoutInDisplayCutoutMode="shortEdges"'
              )

          with open(manifest_path, 'w') as f:
              f.write(manifest)
          print('[OK] AndroidManifest.xml patched with cutout mode')

          # ── 3. Patch android/build.gradle — add Google Services classpath ─────
          # Required so that google-services.json is processed by Gradle.
          # Without this, Firebase has no project credentials → FCM broken.
          build_gradle_path = 'apps/web/android/build.gradle'
          with open(build_gradle_path, 'r') as f:
              build_gradle = f.read()

          if 'com.google.gms:google-services' not in build_gradle:
              build_gradle = re.sub(
                  r"(dependencies \{)",
                  r"\1\n        classpath 'com.google.gms:google-services:4.4.2'",
                  build_gradle,
                  count=1
              )
              with open(build_gradle_path, 'w') as f:
                  f.write(build_gradle)
              print('[OK] android/build.gradle patched with Google Services classpath')
          else:
              print('[SKIP] android/build.gradle already has Google Services classpath')

          # ── 4. Patch android/app/build.gradle — apply Google Services plugin ──
          # apply plugin must come AFTER com.android.application.
          app_build_gradle_path = 'apps/web/android/app/build.gradle'
          with open(app_build_gradle_path, 'r') as f:
              app_build_gradle = f.read()

          if 'com.google.gms.google-services' not in app_build_gradle:
              # Append at the very end of the file
              app_build_gradle = app_build_gradle.rstrip() + "\n\napply plugin: 'com.google.gms.google-services'\n"
              with open(app_build_gradle_path, 'w') as f:
                  f.write(app_build_gradle)
              print('[OK] android/app/build.gradle patched with apply google-services plugin')
          else:
              print('[SKIP] android/app/build.gradle already has google-services plugin')

          PYEOF

      # Generate launcher icons + splash from assets/icon.png using the real Onyx logo
      - name: Generate Android icons
        run: npx @capacitor/assets generate --android
        working-directory: apps/web

      # ── Write google-services.json for Firebase / FCM ──────────────────────
      # The file must exist at android/app/ before Gradle compiles.
      # Store the full JSON content as a GitHub secret: GOOGLE_SERVICES_JSON
      - name: Write google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > apps/web/android/app/google-services.json

      # Sync web assets + config into the android project
      - name: Sync Capacitor
        run: npx cap sync android
        working-directory: apps/web
        env:
          ONYX_APP_URL: ${{ secrets.ONYX_APP_URL }}

      - name: Make gradlew executable
        run: chmod +x apps/web/android/gradlew

      # Build unsigned debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon
        working-directory: apps/web/android

      # Find and rename the APK to a clean filename
      - name: Rename APK
        run: |
          APK=$(find apps/web/android -name "*.apk" | head -1)
          echo "Found APK: $APK"
          cp "$APK" Onyx.apk

      # Upload to GitHub Release (same release as .exe)
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Onyx.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Also save as an Actions artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Onyx-Android-APK
          path: Onyx.apk
          retention-days: 30
