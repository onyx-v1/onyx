name: Desktop Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # apps/desktop is NOT a workspace — installs its own isolated node_modules
      # This ensures electron-builder finds 7zip-bin and other deps locally
      - name: Install desktop dependencies
        run: npm install
        working-directory: apps/desktop

      - name: Generate icons
        shell: powershell
        run: powershell -ExecutionPolicy Bypass -File scripts/generate-icons.ps1
        working-directory: apps/desktop

      - name: Build TypeScript
        run: npm run build
        working-directory: apps/desktop

      - name: Package with electron-builder
        shell: powershell
        env:
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          ONYX_APP_URL: ${{ secrets.ONYX_APP_URL }}
        run: npx electron-builder --win --config electron-builder.config.js --publish always
        working-directory: apps/desktop

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Onyx-Windows-Setup
          path: apps/desktop/release/*.exe
          retention-days: 30
